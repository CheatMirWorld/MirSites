<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MirWorld — Мир анархии</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* БАЗОВЫЙ СТИЛЬ */
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        
        /* ХЕДЕР (ИНТЕРФЕЙС МЕНЮ) */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-around;
            z-index: 1000; border-bottom: 2px solid #ffcc00;
        }
        .navbar a { color: white; text-decoration: none; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .navbar a:hover { color: #ffcc00; }

        /* ГЛАВНЫЙ ЭКРАН */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle, rgba(255,204,0,0.1) 0%, #0a0a0a 100%);
        }
        .hero h1 { font-size: 5rem; color: #ffcc00; margin: 0; animation: fadeInDown 1s; }
        
        /* КНОПКА IP С АНИМАЦИЕЙ */
        .ip-btn {
            margin-top: 30px; padding: 20px 50px; font-size: 1.8rem;
            background: #ffcc00; color: black; border: none; border-radius: 10px;
            font-weight: 900; cursor: pointer; transition: 0.4s;
            animation: pulse 2s infinite;
        }
        .ip-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px #ffcc00; }

        /* КАРТОЧКИ РЕЖИМОВ */
        .modes { display: flex; gap: 30px; padding: 100px 10%; justify-content: center; flex-wrap: wrap; }
        .card {
            background: #151515; padding: 40px; border-radius: 20px; width: 350px;
            border: 1px solid #333; transition: 0.3s;
        }
        .card:hover { border-color: #ffcc00; transform: translateY(-10px); }
        .card.easy h3 { color: #4caf50; }
        .card.hard h3 { color: #f44336; }

        /* АНИМАЦИИ */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,204,0,0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255,204,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,204,0,0); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-size: 1.5rem; color: #ffcc00;">MIRWORLD</div>
        <a href="#">Главная</a>
        <a href="http://MirWorld.fun">Магазин</a>
        <a href="#modes">Правила</a>
        <a href="#">Поддержка</a>
    </nav>

    <header class="hero">
        <h1>MirWorld</h1>
        <p>Настоящая анархия. Твоя история начнется здесь.</p>
        <button class="ip-btn" onclick="copyIp()">mc.MirWorld.fun</button>
    </header>

    <div id="modes" class="modes">
        <div class="card easy">
            <h3>🔥 EASY-АНАРХИЯ</h3>
            <p>Динамичные битвы, легкий старт и огромные кланы. Покажи, кто здесь босс.</p>
        </div>
        <div class="card hard">
            <h3>💀 HARD-АНАРХИЯ</h3>
            <p>Только для профи. Ресурсы ограничены, выживание — это искусство.</p>
        </div>
    </div>

    <script>
        function copyIp() {
            navigator.clipboard.writeText("mc.MirWorld.fun");
            alert("IP сервера mc.MirWorld.fun скопирован!");
        }
    </script>

</body>
</html>
