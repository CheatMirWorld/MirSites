<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин | MirWorld Anarchy</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link href="https://unpkg.com" rel="stylesheet">
    <style>
        :root {
            --easy: #00d2ff;
            --hard: #ff4b2b;
            --bg: #0b0b0d;
            --card: #16161a;
            --text: #e0e0e0;
            --nav-bg: rgba(11, 11, 13, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0b0b0d 100%);
            z-index: -1;
        }

        /* Навигация */
        nav {
            position: fixed; top: 0; width: 100%;
            background: var(--nav-bg); backdrop-filter: blur(15px);
            z-index: 1000; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-container {
            max-width: 1100px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px;
        }

        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--easy); text-decoration: none; font-size: 1.6rem; }

        /* Сетка товаров */
        .container { max-width: 1200px; margin: 0 auto; padding: 150px 20px 50px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }

        .shop-card {
            background: var(--card); border-radius: 20px; padding: 30px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.4s;
        }

        .shop-card:hover { transform: translateY(-10px); border-color: var(--easy); }

        .rank-icon { width: 60px; height: 60px; line-height: 60px; border-radius: 50%; margin: 0 auto 15px; font-family: 'Orbitron'; font-size: 0.8rem; }
        .price { font-size: 1.8rem; font-family: 'Orbitron'; color: #fff; margin: 15px 0; }

        .buy-btn {
            display: block; width: 100%; background: none; border: 2px solid var(--easy);
            color: #fff; padding: 10px; border-radius: 10px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
        }

        .buy-btn:hover { background: var(--easy); color: #000; }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }

        .modal {
            background: var(--card); padding: 40px; border-radius: 20px;
            width: 100%; max-width: 400px; border: 1px solid var(--easy);
            text-align: center; position: relative; animation: modalIn 0.3s ease;
        }

        @keyframes modalIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .modal h2 { font-family: 'Orbitron'; margin-bottom: 20px; color: var(--easy); }
        
        .modal input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #333; background: #0b0b0d; color: #fff; outline: none;
        }

        .modal input:focus { border-color: var(--easy); }

        .confirm-btn {
            width: 100%; padding: 12px; background: var(--easy); border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .close-modal { position: absolute; top: 15px; right: 15px; color: #888; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">MIRWORLD</a>
        </div>
    </nav>

    <div class="container">
        <h1 style="text-align: center; font-family: 'Orbitron'; margin-bottom: 50px;">МАГАЗИН ТОВАРОВ</h1>
        <div class="shop-grid">
            <!-- Пример товара (повторите для всех 10) -->
            <div class="shop-card" data-aos="zoom-in">
                <div class="rank-icon" style="background: #55ff55; color: #000;">VIP</div>
                <h3>VIP Статус</h3>
                <div class="price">99 ₽</div>
                <button class="buy-btn" onclick="openModal('VIP', 99)">Купить</button>
            </div>
            
            <div class="shop-card" data-aos="zoom-in" data-aos-delay="100">
                <div class="rank-icon" style="background: #ff5555; color: #fff;">MYTH</div>
                <h3>MYTHIC</h3>
                <div class="price">999 ₽</div>
                <button class="buy-btn" onclick="openModal('MYTHIC', 999)">Купить</button>
            </div>
            <!-- Добавьте остальные 8 товаров по аналогии -->
        </div>
    </div>

    <!-- ОКНО ОФОРМЛЕНИЯ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Покупка</h2>
            <p id="modalPrice" style="margin-bottom: 20px; opacity: 0.7;"></p>
            
            <input type="text" id="nickname" placeholder="Ваш никнейм в игре" required>
            <input type="email" id="email" placeholder="Ваш Email (для чека)" required>
            
            <button class="confirm-btn" onclick="proceedToPayment()">Перейти к оплате</button>
        </div>
    </div>

    <script src="https://unpkg.com"></script>
    <script>
        AOS.init();

        let currentItem = "";

        function openModal(name, price) {
            currentItem = name;
            document.getElementById('modalTitle').innerText = "Покупка " + name;
            document.getElementById('modalPrice').innerText = "Цена: " + price + " руб.";
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function proceedToPayment() {
            const nick = document.getElementById('nickname').value;
            const email = document.getElementById('email').value;

            if(nick === "" || email === "") {
                alert("Пожалуйста, заполните все поля!");
                return;
            }

            // ТУТ ССЫЛКА НА ВАШ МАГАЗИН (EasyDonate или другой)
            // Мы передаем ник как параметр в ссылке
            const paymentUrl = `https://easydonate.ru{nick}&email=${email}`;
            
            window.location.href = paymentUrl;
        }
    </script>
</body>
</html>
