<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirWorld — Магазин</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <!-- ПОДКЛЮЧЕНИЕ API TRADEMC -->
    <script src="https://api.trademc.org/trademcapi.js"></script>

    <style>
        :root {
            --primary: #ff9d00;
            --bg: #0d0d0d;
            --card: #161616;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #251a0b 0%, #0d0d0d 100%);
            min-height: 100vh;
        }

        /* --- ХЕДЕР --- */
        header {
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary);
        }
        nav {
            max-width: 1200px; margin: 0 auto; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 900; font-size: 1.6rem; color: var(--primary); text-transform: uppercase; text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 25px; }
        .nav-links a { text-decoration: none; color: white; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* --- КОНТЕЙНЕР МАГАЗИНА --- */
        .shop-container {
            max-width: 550px;
            margin: 140px auto 40px;
            padding: 40px;
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: fadeInUp 0.8s ease;
        }

        h1 {
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: var(--primary);
        }

        /* КАСТОМИЗАЦИЯ ФОРМЫ TRADEMC */
        #trademc-buyform {
            color: white !important;
        }
        
        /* Стили полей ввода внутри формы */
        #trademc-buyform input, 
        #trademc-buyform select {
            background: #222 !important;
            border: 1px solid var(--border) !important;
            color: white !important;
            border-radius: 10px !important;
            padding: 12px !important;
            margin-bottom: 15px !important;
            width: 100% !important;
            outline: none !important;
        }

        #trademc-buyform input:focus {
            border-color: var(--primary) !important;
        }

        /* Стили кнопки продолжить */
        #trademc-buyform button {
            background: var(--primary) !important;
            color: black !important;
            font-weight: 900 !important;
            text-transform: uppercase !important;
            border-radius: 12px !important;
            border: none !important;
            padding: 15px !important;
            width: 100% !important;
            cursor: pointer !important;
            transition: 0.3s !important;
            margin-top: 10px !important;
        }

        #trademc-buyform button:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 5px 15px rgba(255, 157, 0, 0.4) !important;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .shop-container { margin: 100px 15px; padding: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="https://mirworld.fun" class="logo">MirWorld</a>
            <ul class="nav-links">
                <li><a href="https://mirworld.fun">Главная</a></li>
                <li><a href="/shop" class="active">Магазин</a></li>
                <li><a href="/rules">Правила</a></li>
                <li><a href="/help">Поддержка</a></li>
            </ul>
        </nav>
    </header>

    <div class="shop-container">
        <h1>Донат-услуги</h1>
        
        <!-- ФОРМА TRADEMC -->
        <div id="trademc-buyform"></div>

        <script>
            TrademcAPI.GetBuyForm({
                "Shop":"241684",
                "Title":"Купить донат",
                "Nickname":"Введите ваш никнейм",
                "Item":"Выберите товар",
                "Coupon":"Введите купон, если есть",
                "Button":"Продолжить",
                "Success_URL":"https://trademc.org",
                "Pending_URL":"https://trademc.org",
                "Fail_URL":"https://trademc.org",
                "PastPlaceID":"trademc-buyform"
            });
        </script>
    </div>

    <div style="text-align: center; opacity: 0.4; padding-bottom: 40px;">
        <p>&copy; 2025-2026 MirWorld. Все права защищены.</p>
        <p>MirWorld не связан с Mojang AB и придерживается её EULA политике. Xsolla является авторизованным глобальным дистрибьютором проекта MirWorld.</p>
    </div>

</body>
</html>
