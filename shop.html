<style>
    @import url('https://googleapis.com');

    body { 
        background-color: #0b0b0b; 
        color: #f5f5f5; 
        margin: 0; 
        font-family: 'Montserrat', sans-serif; 
    }

    /* Шапка MirWorld */
    .mir-header { 
        background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://unsplash.com');
        background-size: cover;
        background-position: center;
        padding: 80px 20px; 
        text-align: center; 
        border-bottom: 4px solid #43a047;
    }
    .mir-header h1 { 
        font-size: 60px; 
        margin: 0; 
        color: #43a047; 
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 8px;
        text-shadow: 0 0 20px rgba(67, 160, 71, 0.6);
    }
    .mir-header p { color: #888; font-size: 18px; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }

    /* Навігація */
    .navbar { 
        background: #121212; 
        display: flex; 
        justify-content: center; 
        gap: 10px;
        position: sticky; 
        top: 0; 
        z-index: 1000;
        border-bottom: 1px solid #222;
    }
    .navbar a { 
        color: #eee; 
        text-decoration: none; 
        padding: 20px 30px; 
        font-weight: 700; 
        font-size: 13px; 
        text-transform: uppercase;
        transition: 0.3s;
    }
    .navbar a:hover { color: #43a047; background: rgba(67, 160, 71, 0.1); }

    /* Контейнер товарів */
    .shop-grid { 
        max-width: 1200px; 
        margin: 50px auto; 
        padding: 20px;
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
        gap: 30px; 
    }

    /* Картка MirWorld */
    .product-card { 
        background: #181818; 
        border: 1px solid #282828; 
        border-radius: 15px; 
        overflow: hidden; 
        transition: all 0.4s ease;
        text-align: center;
        padding: 25px;
    }
    .product-card:hover { 
        transform: translateY(-10px); 
        border-color: #43a047;
        box-shadow: 0 15px 35px rgba(0,0,0,0.8);
    }
    .product-card h3 { font-size: 24px; margin: 15px 0; color: #fff; }
    .product-card .price-tag { 
        display: inline-block;
        background: rgba(67, 160, 71, 0.1);
        color: #43a047;
        padding: 5px 15px;
        border-radius: 50px;
        font-weight: 900;
        margin-bottom: 20px;
        font-size: 18px;
    }

    /* Кнопка */
    .buy-button { 
        background: #43a047; 
        color: #fff; 
        border: none; 
        padding: 14px; 
        width: 100%; 
        border-radius: 8px; 
        font-weight: 900; 
        text-transform: uppercase; 
        cursor: pointer; 
        transition: 0.3s;
        box-shadow: 0 4px 0 #2e7d32;
    }
    .buy-button:hover { background: #4caf50; transform: translateY(-2px); box-shadow: 0 6px 0 #2e7d32; }
    .buy-button:active { transform: translateY(2px); box-shadow: none; }

    .footer { text-align: center; padding: 60px; color: #444; font-size: 13px; }
</style>
