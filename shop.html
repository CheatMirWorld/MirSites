<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин — MirWorld</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <!-- ПІДКЛЮЧЕННЯ API TRADEMC -->
    <script src="https://api.trademc.org/trademcapi.js"></script>

    <style>
        :root {
            --primary: #ff9d00;
            --bg: #0d0d0d;
            --card: #161616;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow-x: hidden;
            /* Фоновий градієнт як на головній */
            background: radial-gradient(circle at center, #251a0b 0%, #0d0d0d 100%);
            min-height: 100vh;
        }

        /* --- ХЕДЕР --- */
        header {
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary);
        }
        nav {
            max-width: 1200px; margin: 0 auto; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 900; font-size: 1.6rem; color: var(--primary); text-transform: uppercase; text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 25px; }
        .nav-links a { text-decoration: none; color: white; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* --- КОНТЕЙНЕР ФОРМИ --- */
        .shop-container {
            max-width: 600px;
            margin: 150px auto 60px;
            padding: 40px;
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeInUp 0.8s ease;
        }

        h1 {
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* Стилізація елементів TradeMC всередині форми */
        #trademc-buyform {
            color: white !important;
        }
        
        /* Цей блок змушує стандартну форму TradeMC виглядати краще */
        #trademc-buyform input, #trademc-buyform select {
            background: #222 !important;
            border: 1px solid var(--border) !important;
            color: white !important;
            border-radius: 8px !important;
            padding: 10px !important;
            margin-bottom: 15px !important;
        }

        #trademc-buyform button {
            background: var(--primary) !important;
            color: black !important;
            font-weight: 900 !important;
            text-transform: uppercase !important;
            border-radius: 10px !important;
            border: none !important;
            cursor: pointer !important;
            transition: 0.3s !important;
        }

        #trademc-buyform button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .shop-container { margin: 100px 20px; padding: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">MirWorld</a>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="#" class="active">Магазин</a></li>
                <li><a href="rules.html">Правила</a></li>
                <li><a href="support.html">Поддержка</a></li>
            </ul>
        </nav>
    </header>

    <div class="shop-container">
        <h1>Покупка доната</h1>
        
        <!-- МІСЦЕ ДЛЯ ФОРМИ TRADEMC -->
        <div id="trademc-buyform"></div>

        <script>
            // Твій скрипт TradeMC
            // ЗАМІНИ "Shop":"1" на свій справжній номер магазину з TradeMC!
            TrademcAPI.GetBuyForm({
                "Shop":"1", 
                "Title":"Выберите товар",
                "Nickname":"Введите ваш никнейм",
                "Item":"Выберите категорию",
                "Coupon":"Введите купон (если есть)",
                "Button":"Продолжить к оплате",
                "Success_URL":"https://mirworld.fun",
                "Pending_URL":"https://mirworld.fun",
                "Fail_URL":"https://mirworld.fun",
                "PastPlaceID":"trademc-buyform"
            });
        </script>
    </div>

    <p style="text-align: center; opacity: 0.4; font-size: 0.8rem;">
        Оплачивая товар, вы подтверждаете согласие с правилами сервера.
    </p>

</body>
</html>
